<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="./style.css">
  <title>calculator</title>
</head>
<body>
  
  <section class="container">
    <div class="box">
      <div class="form-group">
        <input type="text" class="input" id="small-input" autocomplete="off" readonly>
        <input type="text" class="input" id="big-input" autocomplete="off" readonly value="0">
      </div>
      <div class="wrapper-container">
        <button class="button-clear" id="button">C</button>
        <button class="button-delete" id="button">del</button>
        <button class="button operator" data-value="%">%</button>
        <button class="button operator" data-value="/">÷</button>
        <button class="button" data-value="7">7</button>
        <button class="button" data-value="8">8</button>
        <button class="button" data-value="9">9</button>
        <button class="button operator" data-value="*">×</button>
        <button class="button" data-value="4">4</button>
        <button class="button" data-value="5">5</button>
        <button class="button" data-value="6">6</button>
        <button class="button operator" data-value="-">-</button>
        <button class="button" data-value="1">1</button>
        <button class="button" data-value="2">2</button>
        <button class="button" data-value="3">3</button>
        <button class="button operator" data-value="+">+</button>
        <button class="button long-button" data-value="0">0</button>
        <button class="button" data-value=".">.</button>
        <button class="button-equel">=</button>
      </div>
    </div>
  </section>
  
  <script src="./script.js"></script>
</body>
</html>
